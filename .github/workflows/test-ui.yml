# This workflow will install Python dependencies, lint
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: ["trunk"]
  pull_request:
    branches: ["trunk"]

permissions:
  contents: read

jobs:
  gui-tests:

    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v3
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements.txt -c macOS-gui.requirements.txt -c dev-requirements.txt '.[dev,gui]'
      - name: Check
        run: |
          mypy src
      - name: Run Mac GUI tests
        run: |
          CI_MODE=YES encrust devalias
          ./dist/CiPomodouroboros.app/Contents/MacOS/CiPomodouroboros

  model-tests:

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -c requirements.txt

      - name: Test
        run: |
          trial --rterrors --reporter=verbose -j auto pomodouroboros.model.test
